<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>お問い合わせフォーム</title>
  <link rel="stylesheet" href="test.css">
</head>
<body>
  <header>
  <h2>世界一甘いお店</h2>
  </header>
    
  <nav>
    <ul>
    <li><a href="#section1">トップ</a></li>
    <li><a href="#section2">店舗案内</a></li>
    <li><a href="#section3">おすすめのスイーツ</a></li>
    <li><a href="#section4">お問い合わせ</a></li>
    </ul>
  </nav>

  <section id="section2">
   <from> 
     <table border="4">
      <tr>
        <th>お名前</th>
        <td><input type="text" name="name" size="40"></td>
      </tr>
      <tr>
        <th>近くのお店</th>
        <td>
          <select name="store">
            <option>北海道・東北</option>
            <option>関東</option>
            <option>中部</option>
            <option>関西</option>
            <option>中国・四国</option>
            <option>九州・沖縄</option>
          </select>
        </td>
      </tr>
      <tr>
        <th>電話</th>
        <td><input type="text" name="phone" size="40"></td>
      </tr>
      <tr>
        <th>電話番号</th>
        <td><input type="text" name="phone" size="40"></td>
      </tr>
      <tr>
        <th>メールアドレス</th>
        <td><input type="text" name="email" size="40"></td>
      </tr>
      <tr>
        <th>お問い合わせ種別</th>
        <td>
          <input type="radio" name="type" value="商品について"> 商品について
          <input type="radio" name="type" value="従業員について"> 従業員について
        </td>
      </tr>
      <tr>
        <th>お問い合わせ内容</th>
        <td>
          <textarea name="content" cols="30" rows="5" placeholder="詳細を入力してください"></textarea>
        </td>
      </tr>
      </table>
     <input type="submit" value="送信">
   </from>
  </section>

  <footer> 
    
  </footer>

</body>
</html>
